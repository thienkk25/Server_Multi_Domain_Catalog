components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
    page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    search:
      name: search
      in: query
      schema:
        type: string
    sortBy:
      name: sortBy
      in: query
      schema:
        type: string
      description: Field name (tuỳ endpoint)
    sort:
      name: sort
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    filter:
      name: filter
      in: query
      style: deepObject
      explode: true
      schema:
        type: object
        additionalProperties: true
      description: Filter dưới dạng JSON string, ví dụ `{"status":"active"}`

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    SuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          description: Any JSON value
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}
            - type: string
            - type: number
            - type: boolean
    ImportEnvelope:
      type: object
      required: [success, result]
      properties:
        success:
          type: boolean
          example: true
        result:
          description: Import result payload
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}
            - type: string
            - type: number
            - type: boolean

    ErrorEnvelope:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Đã có lỗi xảy ra"
        errors:
          type: array
          items:
            type: object
            additionalProperties: true

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: "12345678"

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 6

    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    ChangePasswordRequest:
      type: object
      required: [new_password]
      properties:
        new_password:
          type: string
          format: password
          example: "NewPass123"

    UpdateProfileRequest:
      type: object
      properties:
        phone:
          type: string
          description: VN phone (ví dụ `+84901234567` hoặc `0901234567`)
        full_name:
          type: string

    DomainUpsertRequest:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true

    CategoryGroupUpsertRequest:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        domain_id:
          type: string

    CategoryItemUpsertRequest:
      type: object
      required: [category_item]
      properties:
        category_item:
          type: object
          additionalProperties: true
          description: Payload cho RPC `admin_create_item/admin_update_item`
        legal_document_ids:
          type: array
          items:
            type: string
          default: []

    CreateCategoryItemVersionRequest:
      type: object
      required: [version_data]
      properties:
        version_data:
          type: object
          additionalProperties: true
        legal_document_ids:
          type: array
          items:
            type: string
          default: []

    UpdateCategoryItemVersionRequest:
      type: object
      required: [version_data]
      properties:
        version_type:
          description: "0: update by item_id; 1: update by version_id (pending)"
          oneOf:
            - type: integer
            - type: string
        version_data:
          type: object
          additionalProperties: true
        legal_document_ids:
          type: array
          items:
            type: string
          default: []

    LegalDocumentUpsertForm:
      type: object
      properties:
        file:
          type: string
          format: binary
        code:
          type: string
        title:
          type: string
        issued_by_name:
          type: string
        type:
          type: string
        status:
          type: string
        description:
          type: string

    ApiKeyCreateRequest:
      type: object
      properties:
        system_name:
          type: string
        allowed_domains:
          description: Array các domain object `{id, code, name}` theo schema trong DB
          type: array
          items:
            type: object
            additionalProperties: true

    AdminCreateUserRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          description: Nếu bỏ trống sẽ dùng mặc định `12345678`
        user_metadata:
          type: object
          additionalProperties: true

    AdminUpdateUserRequest:
      type: object
      properties:
        password:
          type: string
          format: password
        user_metadata:
          type: object
          additionalProperties: true

    GrantAccessRequest:
      type: object
      required: [user_id, role_id]
      properties:
        user_id:
          type: string
        role_id:
          type: integer
        domain_ids:
          type: array
          items:
            type: string
          default: []

    ImportSingleForm:
      type: object
      required: [file, type]
      properties:
        file:
          type: string
          format: binary
          description: CSV/XLSX file
        type:
          type: string
          description: |
            Import type:
            - 1: DOMAIN
            - 2: CATEGORY_GROUP
            - 3: CATEGORY_ITEM
            - 4: API_KEY
            - 5: USERS_MANAGEMENT

    ImportCatalogForm:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
          description: CSV/XLSX file
