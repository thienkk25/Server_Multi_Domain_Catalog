      security:
        - bearerAuth: []
      parameters:
        - name: domain_ids
          in: query
          description: Domain IDs (có thể truyền nhiều giá trị)
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"

