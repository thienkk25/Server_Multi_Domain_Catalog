openapi: 3.0.3
info:
  title: Server Multi Domain Catalog API
  description: |
    Tài liệu API (OpenAPI/Swagger) được sinh lại từ code trong thư mục `src/routes/`.

    - Base path: `/api/v1`
    - Swagger UI: `GET /docs`
  version: 1.0.0

servers:
  - url: http://localhost:{port}/api/v1
    description: Local development
    variables:
      port:
        default: "3000"
  - url: /api/v1
    description: Relative (reverse proxy)

tags:
  - name: Public Catalog
    description: Public catalog endpoints (requires API key)
  - name: Auth
    description: Authentication endpoints
  - name: User
    description: Current user endpoints
  - name: Admin Users
    description: Admin-only user management
  - name: Domain
    description: Domain management
  - name: Category Group
    description: Category group management
  - name: Category Item
    description: Category item management
  - name: Category Item Version
    description: Category item version workflow (domainOfficer/approver)
  - name: Legal Document
    description: Legal document management
  - name: API Key
    description: API key management (admin)
  - name: Activity Log
    description: Activity log (admin)
  - name: Import
    description: Import CSV/XLSX (admin/domainOfficer)

paths:
  /public/catalog/domains:
    get:
      tags: [Public Catalog]
      summary: List domains (public catalog)
      security:
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sort"
        - $ref: "#/components/parameters/filter"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /public/catalog/domains/{id}:
    get:
      tags: [Public Catalog]
      summary: Get domain by id (public catalog)
      security:
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /public/catalog/category-groups:
    get:
      tags: [Public Catalog]
      summary: List category groups (public catalog)
      security:
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sort"
        - $ref: "#/components/parameters/filter"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /public/catalog/category-groups/{id}:
    get:
      tags: [Public Catalog]
      summary: Get category group by id (public catalog)
      security:
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /public/catalog/category-items:
    get:
      tags: [Public Catalog]
      summary: List category items (public catalog)
      security:
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sort"
        - $ref: "#/components/parameters/filter"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
