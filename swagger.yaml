        "401":
          $ref: "#/components/responses/Unauthorized"

  /public/catalog/category-items/{id}:
    get:
      tags: [Public Catalog]
      summary: Get category item by id (public catalog)
      security:
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /public/catalog/sync/category-items:
    get:
      tags: [Public Catalog]
      summary: Sync category items
      description: |
        Lấy danh sách item theo phân trang; nếu truyền `updated_from` sẽ chỉ trả item có `updated_at >= updated_from`.
        Response trả về `{ serverTime, items, pagination }`.
      security:
        - apiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/sort"
        - $ref: "#/components/parameters/filter"
        - name: updated_from
          in: query
          schema:
            type: string
          description: ISO datetime (ví dụ `2026-03-02T00:00:00.000Z`)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/register:
